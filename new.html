<!DOCTYPE html>
<html>
   <head>
    <meta charset="utf-8" />
     <link rel="stylesheet" href="gt.css" />
    <title>Rechercher un trajet</title>
   </head>
   <body>
    <!-- Création de compte -->
<div id="creation-compte">
    <h2>Créer un compte</h2>

    <form action="https://formspree.io/f/TON_ID" method="post">

        <label for="nom">Nom :</label><br>
        <input type="text" id="nom" name="nom" required><br><br>

        <label for="prenom">Prénom :</label><br>
        <input type="text" id="prenom" name="prenom" required><br><br>

        <label for="email">Email :</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="telephone">Téléphone :</label><br>
        <input type="tel" id="telephone" name="telephone" required><br><br>

        <label for="password">Mot de passe :</label><br>
        <input type="password" id="password" name="password" required><br><br>

        <label for="confirm-password">Confirmer le mot de passe :</label><br>
        <input type="password" id="confirm-password" name="confirm-password" required><br><br>

        <button type="submit">S'inscrire</button>
    </form>

    <p>Vous avez déjà un compte ? <a href="#">Se connecter</a></p>
</div>
